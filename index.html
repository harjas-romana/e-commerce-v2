<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Premium Store — curated products for those who demand excellence." />
    <meta name="theme-color" content="#111110" />

    <!-- Preconnect for faster Google Fonts load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Favicon (inline SVG data URI — no extra file needed) -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23111110'/%3E%3Crect x='8' y='8' width='16' height='16' rx='3' fill='none' stroke='%23fff' stroke-width='2' stroke-opacity='.6'/%3E%3C/svg%3E"
    />

    <title>Premium Store</title>

    <!-- Prevent flash of unstyled content -->
    <style>
      html { background: #fafaf9; }
      body { visibility: hidden; }
      body.fonts-loaded { visibility: visible; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Show body once JS has loaded (fallback: show after 300ms) -->
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => document.body.classList.add('fonts-loaded'), 50);
      });
    </script>
  </body>
</html>
